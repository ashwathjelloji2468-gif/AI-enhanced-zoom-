name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: ${{ github.repository }}-web
  IMAGE_NAME_SOCKET: ${{ github.repository }}-socket

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Web App
        id: meta-web
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}

      - name: Build and Push Web App Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      - name: Extract metadata for Socket Server
        id: meta-socket
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SOCKET }}

      - name: Build and Push Socket Server Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.socket
          push: true
          tags: ${{ steps.meta-socket.outputs.tags }}
          labels: ${{ steps.meta-socket.outputs.labels }}
